services:
  - type: web
    name: rdvpro-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -l 3000
    envVars:
      - key: REACT_APP_API_URL
        value: https://rdvpro-backend.onrender.com/api

  - type: web
    name: rdvpro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir src app:create_app --bind 0.0.0.0:5000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rdvpro-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: CORS_ORIGINS
        value: https://rdvpro-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://rdvpro-frontend.onrender.com
      - key: MAIL_USERNAME
        value: ""
      - key: MAIL_PASSWORD
        value: ""
      - key: MAIL_DEFAULT_SENDER
        value: noreply@rdvpro.tn

databases:
  - name: rdvpro-db
    databaseName: rdvpro
    user: rdvpro
